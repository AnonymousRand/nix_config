################################################################################
# configs
################################################################################

font_size 12

# use fish shell
shell fish
shell_integration no-rc no-cursor

# 5 MB scrollback pager (~50k lines at 100 UTF-8 chars/line)
scrollback_pager_history_size 5

# only grid layout is available for windows
# (if adding more, make sure a keybind is set for `next_layout`)
enabled_layouts grid

# (OS) window title colors
wayland_titlebar_color 

# 5 MB scrollback pager (~50k lines at 100 UTF-8 chars/line)
scrollback_pager_history_size 5

cursor_trail 10
cursor_trail_decay 0.2 0.7
cursor_trail_threshold 1

################################################################################
# keybinds
################################################################################

# system
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard
map ctrl+shift+e      open_curl_with_hints
# `scroll` is the default `ctrl + L` behavior in bash: clear but keep terminal history scrollable
map shift+delete      clear_terminal scroll active
map ctrl+shift+delete combine : clear_terminal reset active : send_text all \x0d

# scrolling
map ctrl+e            scroll_line_down
map ctrl+y            scroll_line_up
map ctrl+f            scroll_page_down
map ctrl+b            scroll_page_up
map ctrl+home         scroll_home
map ctrl+end          scroll_end
map ctrl+i            scroll_to_prompt -1
map ctrl+o            scroll_to_prompt 1
map ctrl+/            show_scrollback

# tabs
map ctrl+t            new_tab
map ctrl+shift+q      close_tab
map ctrl+u            previous_tab
map ctrl+p            next_tab
map ctrl+shift+u      move_tab_backward
map ctrl+shift+p      move_tab_forward
map ctrl+shift+r      set_tab_title

# windows
map ctrl+n            new_window
map ctrl+shift+w      close_window
map ctrl+h            neighboring_window left
map ctrl+j            neighboring_window down
map ctrl+k            neighboring_window up
map ctrl+l            neighboring_window right
map ctrl+shift+h      move_window left
map ctrl+shift+j      move_window down
map ctrl+shift+k      move_window up
map ctrl+shift+l      move_window right
