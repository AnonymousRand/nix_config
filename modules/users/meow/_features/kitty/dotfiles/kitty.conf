# note: not complete/outdated as not currently maining kitty

################################################################################
# configs
################################################################################

font_size 12

# use fish shell
shell fish
shell_integration no-rc no-cursor

# 5 MB scrollback pager (~50k lines at 100 UTF-8 chars/line)
scrollback_pager_history_size 5

# only grid layout is available for windows
# (if adding more, make sure a keybind is set for `next_layout`)
enabled_layouts grid

# 1- MB scrollback pager (~100k lines at 100 UTF-8 chars/line)
scrollback_pager_history_size 10

# cursor
cursor_trail 10
cursor_trail_decay 0.2 0.7
cursor_trail_threshold 1

################################################################################
# keybinds
################################################################################

# system
map ctrl+shift+c       copy_to_clipboard
map ctrl+shift+v       paste_from_clipboard
map ctrl+shift+e       open_url_with_hints
# `scroll` is the default `ctrl + L` behavior in bash: clear but keep terminal history scrollable
map shift+delete       clear_terminal scroll active
map ctrl+shift+delete  combine : clear_terminal reset active : send_text all \x0d

# scrolling
map ctrl+e             scroll_line_down
map ctrl+y             scroll_line_up
map ctrl+f             scroll_page_down
map ctrl+b             scroll_page_up
map ctrl+home          scroll_home
map ctrl+end           scroll_end
map ctrl+i             scroll_to_prompt -1
map ctrl+o             scroll_to_prompt 1
map ctrl+shift+/       show_scrollback

# tabs
map ctrl+shift+t       new_tab
map ctrl+shift+q       close_tab
map ctrl+tab           next_tab
map ctrl+shift+tab     previous_tab
map ctrl+alt+shift+tab move_tab_backward
map ctrl+alt+tab       move_tab_forward
map ctrl+shift+r       set_tab_title

# windows
map ctrl+shift+n       new_window
map ctrl+shift+w       close_window
map ctrl+shift+h       neighboring_window left
map ctrl+shift+j       neighboring_window down
map ctrl+shift+k       neighboring_window up
map ctrl+shift+l       neighboring_window right
map ctrl+shift+alt+h   move_window left
map ctrl+shift+alt+j   move_window down
map ctrl+shift+alt+k   move_window up
map ctrl+shift+alt+l   move_window right
